<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>outPass — Digital Hall Passes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,800&display=swap" rel="stylesheet" />
  
  <style>
    /* ── MODERN WHITE & PURPLE VARIABLE OVERRIDE ── */
    :root {
      --ink: #0f172a;
      --surface: #ffffff;
      --bg: #ffffff; 
      --border: #f1f5f9;
      --border2: #e2e8f0;
      --muted: #64748b;
      --muted2: #94a3b8;
      --violet: #7c3aed;
      --violet2: #8b5cf6;
      --violet-bg: #f5f3ff;
      --green: #10b981;
      --red: #ef4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAVIGATION ── */
    #main-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 70px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nl-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 1.5rem; color: var(--ink);
      text-decoration: none; display: flex; align-items: center;
    }
    .nl-logo span { color: var(--violet); }
    .nl-signin { 
      padding: .6rem 1.2rem; font-size: .85rem; font-weight: 600; 
      color: var(--ink); background: white; border: 1px solid var(--border2); 
      border-radius: 10px; cursor: pointer; transition: 0.2s;
    }
    .nl-signin:hover { border-color: var(--violet); color: var(--violet); }

    /* ── HERO SECTION ── */
    .lp-hero {
      padding: 160px 2rem 80px;
      max-width: 1200px; margin: 0 auto;
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }
    .lp-h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 800; line-height: 1; letter-spacing: -0.04em;
      margin-bottom: 1.5rem; color: var(--ink);
    }
    .h1-grad {
      background: linear-gradient(135deg, var(--violet) 0%, #a855f7 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .lp-sub {
      font-size: 1.2rem; color: var(--muted); max-width: 600px; margin-bottom: 2.5rem;
    }
    .btn-hero-primary {
      padding: 1rem 2rem; font-size: 1rem; font-weight: 700;
      background: var(--violet); color: white; border: none;
      border-radius: 12px; cursor: pointer; transition: 0.2s;
      box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
    }
    .btn-hero-primary:hover { transform: translateY(-2px); background: var(--violet2); }

    /* ── LOGIN MODAL (LOCAL ONLY) ── */
    #login-overlay {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px); z-index: 1000;
      display: none; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    .login-card {
      background: white; padding: 2.5rem; border-radius: 24px;
      width: 100%; max-width: 400px; border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }
    .login-card h2 { font-family: 'Bricolage Grotesque'; margin-bottom: 0.5rem; }
    .login-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    
    .input-group { margin-bottom: 1.2rem; text-align: left; }
    .input-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .input-group input {
      width: 100%; padding: 14px; border: 1px solid var(--border2);
      border-radius: 12px; outline: none; transition: 0.2s;
    }
    .input-group input:focus { border-color: var(--violet); box-shadow: 0 0 0 4px var(--violet-bg); }

    .login-submit {
      width: 100%; padding: 14px; background: var(--violet); color: white;
      border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 1rem;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

  <nav id="main-nav">
    <a href="#" class="nl-logo">out<span>Pass</span></a>
    <div class="nl-actions">
      <button class="nl-signin" id="open-login">Sign In</button>
    </div>
  </nav>

  <main class="lp-hero">
    <h1 class="lp-h1">The <span class="h1-grad">smarter way</span> to move through school.</h1>
    <p class="lp-sub">Modern digital hall passes that save time for teachers and keep students safe. No more paper, no more hassle.</p>
    <button class="btn-hero-primary">Get Started for Free</button>
  </main>

  <div id="login-overlay">
    <div class="login-card">
      <h2>Welcome back</h2>
      <p>Enter your school details to continue.</p>
      
      <form id="local-login-form">
        <div class="input-group">
          <label>School Email</label>
          <input type="email" placeholder="you@school.edu" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="login-submit" id="submit-btn">Sign In</button>
      </form>
      
      <button onclick="closeLogin()" style="background:none; border:none; color:var(--muted); font-size:0.8rem; margin-top:1.5rem; cursor:pointer; width:100%;">
        Go Back
      </button>
    </div>
  </div>

  <script>
    const loginOverlay = document.getElementById('login-overlay');
    const openBtn = document.getElementById('open-login');
    const loginForm = document.getElementById('local-login-form');
    const submitBtn = document.getElementById('submit-btn');

    // UI Logic: Open Modal
    openBtn.addEventListener('click', () => {
      loginOverlay.style.display = 'flex';
    });

    // UI Logic: Close Modal
    function closeLogin() {
      loginOverlay.style.display = 'none';
    }

    // "Fake" Login Logic: No APIs, just UI behavior
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault(); // Stops the page from trying to send data to a server
      
      submitBtn.innerText = "Authenticating...";
      submitBtn.disabled = true;
      submitBtn.style.opacity = "0.7";

      // Simulate a local "success" delay
      setTimeout(() => {
        alert("Front-end demo success! In a production environment, this is where an API would verify your credentials.");
        submitBtn.innerText = "Sign In";
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
        closeLogin();
      }, 1200);
    });

    // Close on background click
    window.onclick = function(event) {
      if (event.target == loginOverlay) {
        closeLogin();
      }
    }
  </script>

</body>
</html>
