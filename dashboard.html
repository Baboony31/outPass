<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>outPass Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #7c3aed; --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --success: #10b981; --danger: #ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
    
    /* SIDEBAR */
    aside { width: 260px; background: white; border-right: 1px solid var(--border); padding: 2rem 1.5rem; position: fixed; height: 100vh; }
    .logo { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: 1.5rem; text-decoration: none; color: var(--text); margin-bottom: 2rem; display: block; }
    .logo span { color: var(--primary); }
    .nav-link { display: block; padding: 12px; text-decoration: none; color: var(--muted); font-weight: 600; border-radius: 8px; margin-bottom: 5px; }
    .nav-link.active { background: #f5f3ff; color: var(--primary); }

    /* CONTENT */
    main { margin-left: 260px; flex: 1; padding: 2rem 3rem; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .view-pane { display: none; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* UI ELEMENTS */
    .card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-p { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
    td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .timer { font-family: monospace; font-weight: 700; color: var(--primary); font-size: 1.1rem; }
  </style>
</head>
<body>

  <aside>
    <a href="index.html" class="logo">out<span>Pass</span></a>
    <div id="sidebar-nav">
      </div>
    <a href="index.html" class="nav-link" style="margin-top:auto; color:var(--danger)">Logout</a>
  </aside>

  <main>
    <header>
      <h1 id="view-title" style="font-family: 'Bricolage Grotesque';">Dashboard</h1>
      <div id="header-action"></div>
    </header>

    <div id="student-view" class="view-pane">
      <div class="card">
        <h3>Request a Hall Pass</h3>
        <div style="display:flex; gap:10px; margin-top:15px;">
          <select id="dest" style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--border);">
            <option>Restroom (North)</option>
            <option>Nurse's Office</option>
            <option>Main Office</option>
            <option>Library</option>
          </select>
          <button class="btn btn-p" onclick="studentRequest()">Submit Request</button>
        </div>
      </div>
      <div class="card">
        <h3>Active / Pending Passes</h3>
        <div id="student-active-list" style="margin-top:10px; color:var(--muted)">No active passes.</div>
      </div>
    </div>

    <div id="teacher-view" class="view-pane">
      <div class="card">
        <h3>Classroom Requests</h3>
        <div id="teacher-requests">
          <p style="color:var(--muted)">No pending requests.</p>
        </div>
      </div>
    </div>

    <div id="admin-view" class="view-pane">
      <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-bottom:20px;">
        <div class="card" style="text-align:center"><h4>Active</h4><h2 id="admin-count">0</h2></div>
        <div class="card" style="text-align:center"><h4>Overdue</h4><h2 style="color:var(--danger)">0</h2></div>
        <div class="card" style="text-align:center"><h4>Total Today</h4><h2>142</h2></div>
      </div>
      <div class="card">
        <h3>Live Campus Monitor</h3>
        <table id="admin-table">
          <thead><tr><th>Student</th><th>Location</th><th>Time</th><th>Action</th></tr></thead>
          <tbody id="admin-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role') || 'student';
    
    // Global "Database" Simulation
    let activePasses = [];

    // 1. Setup UI based on Role
    function init() {
      document.querySelectorAll('.view-pane').forEach(p => p.style.display = 'none');
      const nav = document.getElementById('sidebar-nav');
      
      if(role === 'student') {
        document.getElementById('student-view').style.display = 'block';
        document.getElementById('view-title').innerText = "Student Portal";
        nav.innerHTML = `<a href="#" class="nav-link active">My Passes</a><a href="#" class="nav-link">Settings</a>`;
      } 
      else if(role === 'teacher') {
        document.getElementById('teacher-view').style.display = 'block';
        document.getElementById('view-title').innerText = "Classroom Manager";
        nav.innerHTML = `<a href="#" class="nav-link active">Requests</a><a href="#" class="nav-link">Roster</a>`;
        // Mock a request for the teacher to see
        addMockRequest();
      } 
      else if(role === 'admin') {
        document.getElementById('admin-view').style.display = 'block';
        document.getElementById('view-title').innerText = "Campus Admin";
        nav.innerHTML = `<a href="#" class="nav-link active">Live Monitor</a><a href="#" class="nav-link">Analytics</a><a href="#" class="nav-link">Staff</a>`;
      }
    }

    // 2. Student Logic
    function studentRequest() {
      const dest = document.getElementById('dest').value;
      alert("Request sent to teacher!");
      document.getElementById('student-active-list').innerHTML = `
        <div class="card" style="border-left: 4px solid var(--primary); margin-top:10px;">
          <strong>Requesting: ${dest}</strong><br>
          <small>Status: Waiting for Teacher approval...</small>
        </div>`;
    }

    // 3. Teacher Logic
    function addMockRequest() {
      const container = document.getElementById('teacher-requests');
      container.innerHTML = `
        <div id="mock-row" style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:#f8fafc; border-radius:12px; border:1px solid var(--border);">
          <div><strong>Avery Miller</strong><br><small>To: Restroom (North)</small></div>
          <div style="display:flex; gap:10px;">
            <button class="btn btn-success" onclick="approveRequest()">Approve</button>
            <button class="btn btn-danger" onclick="document.getElementById('mock-row').remove()">Deny</button>
          </div>
        </div>`;
    }

    function approveRequest() {
      alert("Pass Approved!");
      document.getElementById('teacher-requests').innerHTML = `<p style="color:var(--success)">Pass is currently active. Avery Miller is in the hall.</p>`;
    }

    // 4. Admin Logic (Ending Passes)
    function endPass(btn) {
      btn.closest('tr').remove();
      const count = document.getElementById('admin-count');
      count.innerText = Math.max(0, parseInt(count.innerText) - 1);
    }

    // 5. Timer Logic
    setInterval(() => {
      document.querySelectorAll('.timer-val').forEach(el => {
        let [m, s] = el.innerText.split(':').map(Number);
        s++; if(s>=60) { s=0; m++; }
        el.innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
      });
    }, 1000);

    // Populate some admin data on start
    if(role === 'admin') {
      const data = [
        { name: "Jordan Smith", loc: "Library", time: "04:12" },
        { name: "Sarah Chen", loc: "Nurse", time: "01:45" }
      ];
      const body = document.getElementById('admin-body');
      document.getElementById('admin-count').innerText = data.length;
      data.forEach(p => {
        body.innerHTML += `<tr><td>${p.name}</td><td>${p.loc}</td><td class="timer-val">${p.time}</td><td><button class="btn btn-outline" style="font-size:0.7rem; border:1px solid var(--border)" onclick="endPass(this)">End Pass</button></td></tr>`;
      });
    }

    init();
  </script>
</body>
</html>
